name: Merge-forward skill branches

on:
  push:
    branches: [master]

permissions:
  contents: write
  issues: write

jobs:
  merge-forward:
    if: github.repository == 'le-dat/zentrix-landingpage'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge master into each feat branch
        id: merge
        run: |
          FAILED=""
          SUCCEEDED=""
          FAILURE_SUMMARY=""

          # List all remote feat branches
          mapfile -t FEAT_BRANCHES < <(git branch -r --list 'origin/feat/*' | sed 's|origin/||' | tr -d ' ')

          if [ -z "${FEAT_BRANCHES[*]}" ]; then
            echo "No feat branches found."
            exit 0
          fi

          for BRANCH in "${FEAT_BRANCHES[@]}"; do
            FEAT_NAME=$(echo "$BRANCH" | sed 's|feat/||')
            echo ""
            echo "=== Processing $BRANCH ==="

            # Checkout the feat branch
            git checkout -B "$BRANCH" "origin/$BRANCH"

            # Attempt merge
            if ! git merge master --no-edit; then
              echo "::warning::Merge conflict in $BRANCH"
              git diff --name-only --diff-filter=U > "conflict-files-${FEAT_NAME}.txt"
              git diff --conflict-style=zdiff3 > "conflict-diff-${FEAT_NAME}.log"
              FAILURE_SUMMARY="${FAILURE_SUMMARY}- \`feat/${FEAT_NAME}\` → ❌ merge conflict"$'\n'"
              git merge --abort || true
              FAILED="$FAILED $FEAT_NAME"
              continue
            fi

            # Check if there's anything new to push
            if git diff --quiet "origin/$BRANCH"; then
              echo "$BRANCH is already up to date with master."
              SUCCEEDED="$SUCCEEDED $FEAT_NAME"
              continue
            fi

            # Install deps and validate
            pnpm install

            if ! pnpm lint > "lint-${FEAT_NAME}.log" 2>&1; then
              echo "::warning::Lint check failed for $BRANCH"
              FAILURE_SUMMARY="${FAILURE_SUMMARY}- \`feat/${FEAT_NAME}\` → ❌ lint failed"$'\n'"
              git reset --hard "origin/$BRANCH"
              FAILED="$FAILED $FEAT_NAME"
              continue
            fi

            if ! pnpm exec tsc --noEmit > "tsc-${FEAT_NAME}.log" 2>&1; then
              echo "::warning::Type check failed for $BRANCH"
              FAILURE_SUMMARY="${FAILURE_SUMMARY}- \`feat/${FEAT_NAME}\` → ❌ type check failed"$'\n'"
              git reset --hard "origin/$BRANCH"
              FAILED="$FAILED $FEAT_NAME"
              continue
            fi

            # Push the updated branch
            git push origin "$BRANCH"
            SUCCEEDED="$SUCCEEDED $FEAT_NAME"
            echo "$BRANCH merged and pushed successfully."
          done

          echo ""
          echo "=== Results ==="
          echo "Succeeded: $SUCCEEDED"
          echo "Failed: $FAILED"

          # Export for issue creation
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "succeeded=$SUCCEEDED" >> "$GITHUB_OUTPUT"
          printf "failures=${FAILURE_SUMMARY}" >> "$GITHUB_OUTPUT"

      - name: Upload failure logs
        if: steps.merge.outputs.failed != ''
        uses: actions/upload-artifact@v4
        with:
          name: merge-forward-logs-${{ github.run_number }}
          path: |
            conflict-files-*.txt
            conflict-diff-*.log
            lint-*.log
            tsc-*.log
          retention-days: 7

      - name: Open issue for failed merges
        if: steps.merge.outputs.failed != ''
        uses: actions/github-script@v7
        with:
          script: |
            const failed = '${{ steps.merge.outputs.failed }}'.trim().split(/\s+/);
            const sha = context.sha.substring(0, 7);
            const failures = `$${{ steps.merge.outputs.failures }}`;
            const body = [
              `The merge-forward workflow failed to merge \`master\` (${sha}) into the following feat branches:`,
              '',
              failures,
              '',
              'Detailed logs (conflict diffs, lint output, TypeScript errors) are attached as artifacts.',
              '',
              `Triggered by push to master: ${context.sha}`
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Merge-forward failed for ${failed.length} feat branch(es) after ${sha}`,
              body,
              labels: ['maintenance']
            });
